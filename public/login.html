<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In · Bharat Steel Group Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    max-width: 460px;
    width: 100%;
    background: var(--bsg-card);
    border: 1px solid var(--bsg-line);
    border-top: 4px solid var(--bsg-blue);
    border-radius: 4px;
    padding: 56px 48px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .login-card .group-logo-wrap img {
    max-width: 220px;
    height: auto;
    margin-bottom: 28px;
  }
  .login-card h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--bsg-ink);
    margin-bottom: 10px;
  }
  .login-card p {
    color: var(--bsg-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .google-btn {
    width: 100%;
    background: var(--bsg-ink);
    color: white;
    padding: 14px 20px;
    border: none;
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.2s ease;
    text-decoration: none;
  }
  .google-btn:hover {
    background: var(--bsg-blue);
    transform: translateY(-1px);
  }
  .google-btn svg {
    width: 20px;
    height: 20px;
    background: white;
    border-radius: 50%;
    padding: 2px;
  }
  .login-card .footer-note {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px dashed var(--bsg-line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--bsg-muted);
    text-transform: uppercase;
  }
  .error-box {
    background: rgba(220,38,38,0.08);
    border-left: 3px solid var(--bsg-danger);
    color: var(--bsg-danger);
    padding: 12px 14px;
    border-radius: 3px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: left;
    line-height: 1.5;
  }
  .corner-mark {
    position: fixed;
    bottom: 24px;
    left: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--bsg-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="group-logo-wrap">
      <img src="/assets/group-logo.png" alt="The Bharat Steel Group" />
    </div>
    <h1>Employee Portal</h1>
    <p>Secure sign-in is required.<br>Use your company Google Workspace account.</p>

    <div id="errorBox" class="error-box" style="display:none;"></div>

    <a href="/auth/google" class="google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
        <path fill="#FBBC04" d="M5.84 14.1A6.6 6.6 0 0 1 5.5 12c0-.73.12-1.43.34-2.1V7.07H2.18A11 11 0 0 0 1 12c0 1.77.42 3.44 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.55 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
      </svg>
      Sign in with Google
    </a>

    <div class="footer-note">
      THE BHARAT STEEL GROUP · ESTD 1972
    </div>
  </div>

  <div class="corner-mark">SECURE PORTAL · TLS</div>

  <script>
    const params = new URLSearchParams(location.search);
    const err = params.get('error');
    if (err) {
      const box = document.getElementById('errorBox');
      box.textContent = err;
      box.style.display = 'block';
    }
  </script>
</body>
</html>
