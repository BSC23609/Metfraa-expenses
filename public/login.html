<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In · Bharat Steel Group Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    max-width: 460px;
    width: 100%;
    background: var(--bsg-card);
    border: 1px solid var(--bsg-line);
    border-top: 4px solid var(--bsg-blue);
    border-radius: 4px;
    padding: 56px 48px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .login-card .group-logo-wrap img {
    max-width: 220px;
    height: auto;
    margin-bottom: 28px;
  }
  .login-card h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--bsg-ink);
    margin-bottom: 10px;
  }
  .login-card p {
    color: var(--bsg-muted);
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .sso-btn {
    width: 100%;
    padding: 13px 20px;
    border: 1px solid var(--bsg-line);
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.2s ease;
    text-decoration: none;
    background: #fff;
    color: var(--bsg-ink);
    margin-bottom: 12px;
  }
  .sso-btn:hover { border-color: var(--bsg-ink); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .sso-btn svg { width: 20px; height: 20px; }
  .ms-btn { font-weight: 600; }
  .divider {
    display: flex; align-items: center; text-align: center;
    color: var(--bsg-muted); font-size: 12px; margin: 22px 0 18px;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--bsg-line); }
  .divider span { padding: 0 12px; }
  .pw-form { display: flex; flex-direction: column; gap: 10px; }
  .pw-form input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--bsg-line);
    border-radius: 3px; font-family: 'Inter', sans-serif; font-size: 14px;
  }
  .pw-form input:focus { outline: none; border-color: var(--bsg-blue); box-shadow: 0 0 0 3px rgba(31,124,203,0.12); }
  .primary-btn {
    width: 100%; background: var(--bsg-blue); color: #fff; border: none;
    padding: 13px; border-radius: 3px; font-family: 'Oswald', sans-serif;
    font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; transition: background 0.2s ease; margin-top: 4px;
  }
  .primary-btn:hover { background: var(--bsg-blue-dark); }
  .ok-box {
    background: rgba(5,150,105,0.08); border-left: 3px solid var(--bsg-success);
    color: var(--bsg-success); padding: 12px 14px; border-radius: 3px;
    font-size: 13px; margin-bottom: 20px; text-align: left; line-height: 1.5;
  }
  .login-card .footer-note {
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px dashed var(--bsg-line);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--bsg-muted);
    text-transform: uppercase;
  }
  .error-box {
    background: rgba(220,38,38,0.08);
    border-left: 3px solid var(--bsg-danger);
    color: var(--bsg-danger);
    padding: 12px 14px;
    border-radius: 3px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: left;
    line-height: 1.5;
  }
  .corner-mark {
    position: fixed;
    bottom: 24px;
    left: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--bsg-muted);
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="login-card">
    <div class="group-logo-wrap">
      <img src="/assets/group-logo.png" alt="The Bharat Steel Group" />
    </div>
    <h1>Employee Portal</h1>
    <p id="loginIntro">Sign in with your work account, or your portal password.</p>

    <div id="errorBox" class="error-box" style="display:none;"></div>
    <div id="okBox" class="ok-box" style="display:none;"></div>

    <!-- SSO + password chooser -->
    <div id="loginView">
      <a href="/auth/microsoft" class="sso-btn ms-btn">
        <svg viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="12" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="12" width="10" height="10" fill="#00A4EF"/>
          <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
        </svg>
        Sign in with Microsoft
      </a>

      <a href="/auth/google" class="sso-btn google-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
          <path fill="#FBBC04" d="M5.84 14.1A6.6 6.6 0 0 1 5.5 12c0-.73.12-1.43.34-2.1V7.07H2.18A11 11 0 0 0 1 12c0 1.77.42 3.44 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.55 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        Sign in with Google
      </a>

      <div class="divider"><span>or use your portal password</span></div>

      <div class="pw-form">
        <input type="email" id="pwEmail" placeholder="Email address" autocomplete="username" />
        <input type="password" id="pwPass" placeholder="Password" autocomplete="current-password" />
        <button id="pwLoginBtn" class="primary-btn">Sign In</button>
      </div>
    </div>

    <!-- Forced password-change view -->
    <div id="changeView" style="display:none;">
      <p style="margin-bottom:18px;">For security, please set a new password before continuing.</p>
      <div class="pw-form">
        <input type="password" id="newPass" placeholder="New password (min 8 chars)" autocomplete="new-password" />
        <input type="password" id="newPass2" placeholder="Confirm new password" autocomplete="new-password" />
        <button id="changeBtn" class="primary-btn">Set Password &amp; Continue</button>
      </div>
    </div>

    <div class="footer-note">
      METFRAA STEEL BUILDINGS PVT. LTD.
    </div>
  </div>

  <div class="corner-mark">SECURE PORTAL · TLS</div>

  <script>
    const params = new URLSearchParams(location.search);
    const errorBox = document.getElementById('errorBox');
    const okBox = document.getElementById('okBox');
    function showErr(m){ errorBox.textContent = m; errorBox.style.display='block'; okBox.style.display='none'; }
    function showOk(m){ okBox.textContent = m; okBox.style.display='block'; errorBox.style.display='none'; }

    if (params.get('error')) showErr(params.get('error'));

    // Forced password-change mode (?change=1)
    if (params.get('change') === '1') {
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('changeView').style.display = 'block';
      document.getElementById('loginIntro').textContent = 'Set a new password';
    }

    // Password login
    document.getElementById('pwLoginBtn').addEventListener('click', async () => {
      const email = document.getElementById('pwEmail').value.trim();
      const password = document.getElementById('pwPass').value;
      if (!email || !password) { showErr('Enter your email and password.'); return; }
      try {
        const res = await fetch('/auth/local', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) { showErr(data.error || 'Login failed.'); return; }
        if (data.must_change_pw) { location.href = '/login?change=1'; return; }
        location.href = '/';
      } catch (e) { showErr('Login failed. Try again.'); }
    });
    document.getElementById('pwPass').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('pwLoginBtn').click(); });

    // Forced password change
    document.getElementById('changeBtn') && document.getElementById('changeBtn').addEventListener('click', async () => {
      const p1 = document.getElementById('newPass').value;
      const p2 = document.getElementById('newPass2').value;
      if (p1.length < 8) { showErr('Password must be at least 8 characters.'); return; }
      if (p1 !== p2) { showErr('Passwords do not match.'); return; }
      try {
        const res = await fetch('/auth/change-password', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ new_password: p1 }),
        });
        const data = await res.json();
        if (!res.ok) { showErr(data.error || 'Could not set password.'); return; }
        showOk('Password updated. Redirecting…');
        setTimeout(() => location.href = '/', 800);
      } catch (e) { showErr('Could not set password. Try again.'); }
    });
  </script>
</body>
</html>
